name: Mutation

# Mutation runs are slow and noisy on every push, so they live here:
#   - nightly cron (low priority, runs against main)
#   - manual trigger when you want a fresh report
#   - PR opt-in via the `run-mutation` label
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  mutate:
    if: github.event_name != 'pull_request' || github.event.label.name == 'run-mutation'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bunx stryker run --incremental
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stryker-report
          path: reports/stryker/
          retention-days: 30
