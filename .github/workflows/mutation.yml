name: Mutation

# Mutation runs are slow and noisy on every push, so they live here:
#   - nightly cron (low priority, runs against main)
#   - manual trigger when you want a fresh report
#   - PR opt-in via the `run-mutation` label
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  mutate:
    if: github.event_name != 'pull_request' || github.event.label.name == 'run-mutation'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile

      # Stryker config sets `incremental: true` +
      # `incrementalFile: reports/stryker-incremental.json`. Without a
      # cache between runs the file starts empty every time, so
      # mutation starts from scratch and times out (the past 3 nightly
      # runs all cancelled at 1h30m). Cache it across runs keyed on the
      # src/ tree hash so we re-baseline when code changes, otherwise
      # we resume from the last partial state.
      - name: Restore stryker incremental cache
        id: stryker-cache
        uses: actions/cache@v5
        with:
          path: reports/stryker-incremental.json
          key: stryker-incremental-${{ hashFiles('src/**/*.ts', 'relay/src/**/*.ts') }}
          restore-keys: |
            stryker-incremental-

      - run: bunx stryker run --incremental
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stryker-report
          path: reports/stryker/
          retention-days: 30
