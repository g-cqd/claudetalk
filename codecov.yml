codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 2%
    patch:
      default:
        target: 60%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

ignore:
  - "test/**"
  - "scripts/**"
  - "hooks/**"
  - "bin/cli.ts"
